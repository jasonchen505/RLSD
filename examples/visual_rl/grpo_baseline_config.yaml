# Baseline GRPO Training Configuration
# Replace the data paths with the files downloaded from the released dataset,
# or override them from the training script via TRAIN_DATA and VAL_DATA.
#
# Expected data format:
# {
#     "problem": "question text...",
#     "answer": "ground-truth answer",
#     "problem_type": "math",
#     "data_type": "image" | "video" | "text",
#     "images": ["path/to/image.jpg"] or [],
#     "videos": ["path/to/video.mp4"] or []
# }

data:
  train_files: data/train.jsonl
  val_files: data/val.jsonl

  prompt_key: problem
  answer_key: answer
  image_key: images
  video_key: videos

  image_dir: null

  video_fps: 2.0
  video_max_frames: 128
  use_preprocessed_videos: false

  min_pixels: 262144
  image_max_pixels: 1048576
  video_max_pixels: 262144

  max_prompt_length: 16384
  max_response_length: 4096
  filter_overlong_prompts: false

  rollout_batch_size: 256
  mini_rollout_batch_size: null
  val_batch_size: 256

  format_prompt: examples/visual_rl/format_prompt/unified.jinja
  override_chat_template: null
  shuffle: false
  seed: 1

algorithm:
  adv_estimator: grpo
  disable_kl: true
  use_kl_loss: false
  kl_penalty: low_var_kl
  kl_coef: 0.01

  online_filtering: false
  filter_key: overall
  filter_low: 0.01
  filter_high: 0.99
worker:
  actor:
    global_batch_size: 256
    micro_batch_size_per_device_for_update: 1
    micro_batch_size_per_device_for_experience: 1
    max_grad_norm: 1.0

    clip_ratio_low: 0.2
    clip_ratio_high: 0.28

    padding_free: true
    dynamic_batching: true
    ulysses_size: 1

    model:
      model_path: Qwen/Qwen3-VL-8B-Instruct
      enable_gradient_checkpointing: true
      trust_remote_code: false
      freeze_vision_tower: false

    optim:
      lr: 1.0e-6
      weight_decay: 0.01
      strategy: adamw
      lr_warmup_ratio: 0.0

    fsdp:
      enable_full_shard: true
      enable_cpu_offload: false
      enable_rank0_init: true

    offload:
      offload_params: true
      offload_optimizer: true

  rollout:
    n: 8
    temperature: 1.0
    top_p: 1.0

    limit_images: 0
    gpu_memory_utilization: 0.6
    enforce_eager: false
    enable_chunked_prefill: true
    tensor_parallel_size: 1
    max_num_batched_tokens: 32768
    disable_tqdm: false

    val_override_config:
      temperature: 0.7
      top_p: 0.8
      top_k: 20
      repetition_penalty: 1.0
      presence_penalty: 1.5
      n: 1

  ref:
    fsdp:
      enable_full_shard: true
      enable_cpu_offload: true
      enable_rank0_init: true
    offload:
      offload_params: false

  reward:
    reward_function: examples/visual_rl/reward_function/unified.py:compute_score

trainer:
  total_epochs: 10
  max_steps: null

  project_name: rlsd
  experiment_name: grpo_baseline_qwen3vl8b

  logger: ["file", "wandb"]

  nnodes: 1
  n_gpus_per_node: 8

  max_try_make_batch: 20
  val_freq: 5
  val_before_train: true
  val_only: false
  val_generations_to_log: 3

  save_freq: 10
  save_limit: 5
  save_model_only: false
  save_checkpoint_path: null
  load_checkpoint_path: null
  find_last_checkpoint: true
